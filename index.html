<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Szerver & Közösség</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #1e1e24; 
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a32;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { color: #4caf50; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #ccc; }
        .btn {
            display: inline-block;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px 30px;
            background: #5865F2; /* Discord kék */
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #4752c4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Üdvözöllek! 👋</h1>
    <p>Ha szeretnél egy igazán jó <strong>Minecraft szervert és közösséget</strong>, akkor nálunk a helyed! Várunk szeretettel a szerverünkön.</p>
    
    <a href="http://discord.gg/BmAZBVxE4S" target="_blank" class="btn">
        🔗 Csatlakozz itt
    </a>
</div>

</body>
</html>
